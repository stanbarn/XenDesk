name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: xendesk
          POSTGRES_PASSWORD: xendesk_dev_pw
          POSTGRES_DB: xendesk_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U xendesk"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://xendesk:xendesk_dev_pw@localhost:5432/xendesk_test?schema=public
      TEST_DATABASE_URL: postgresql://xendesk:xendesk_dev_pw@localhost:5432/xendesk_test?schema=public
      AUTH_SECRET: ci-test-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # postinstall runs `prisma generate`.
      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Apply migrations
        run: npm run db:deploy

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
